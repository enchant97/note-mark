targets:
  deps-frontend:
    program: "pnpm"
    args:
      - i
    cwd: frontend
  codegen-backend:
    program: go
    args:
      - tool
      - sqlc
      - generate
    cwd: backend
  dev-frontend:
    program: pnpm
    args:
      - run
      - dev
    cwd: frontend
  dev-backend:
    program: go
    args:
      - run
      - .
      - serve
    env_file: .env
    cwd: backend
  dev-backend-cli:
    program: go
    args:
      - run
      - .
    env_file: .env
    cwd: backend
